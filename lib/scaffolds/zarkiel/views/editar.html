<script>
var $form = {
	
	requestUrl: '/<%=all_var %>/save',
	
	// response => 1
	
	success: function (r){
		jAlert('Datos modificados correctamente',function(){
			$form.getBack();
			zk.load('/<%=all_var %>');
		});
	},
	
	// response => 0
	
	failed: function(r){
		jAlert('No se pudieron modificar los datos');
	},
	
	// undefined response
	
	undefined: function(r){
		
	},
	
	getBack: function(){
		$.fancybox.close();
	}
}
</script>
<div class="block">
	<h2>Editar <%=model_name.capitalize %></h2>
	<%='<' %>%=render :file => '<%=all_var %>/_form' %<%='>' %>
</div>
